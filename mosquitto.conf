# Mosquitto broker — configuração local de desenvolvimento
# Projeto: F1M13-Projeto1 — Rede IoT Simulada com MQTT

# Porta padrão MQTT
listener 1883

# Protocolo
protocol mqtt

# Permite conexões sem autenticação (apenas para desenvolvimento local)
# ATENÇÃO: em produção, substituir por autenticação com password_file e TLS
allow_anonymous true

# Log de conexões e mensagens (útil para debug)
log_type all
